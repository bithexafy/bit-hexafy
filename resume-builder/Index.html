<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Resume Builder</title>
    <!-- Font Awesome 6 (Free Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- SortableJS for drag-and-drop section reordering -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f0f2f5;
            padding: 24px 20px;
        }

        /* Light / Dark Mode Variables */
        body.light {
            --bg-body: #f4f7fc;
            --bg-panel: rgba(255, 255, 255, 0.85);
            --card-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #334155;
            --border: #e2e8f0;
            --shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08);
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --glass-border: rgba(255,255,255,0.5);
        }
        body.dark {
            --bg-body: #0f172a;
            --bg-panel: rgba(15, 23, 42, 0.75);
            --card-bg: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border: #334155;
            --shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.4);
            --accent: #60a5fa;
            --accent-hover: #3b82f6;
            --glass-border: rgba(255,255,255,0.1);
        }

        body {
            background: var(--bg-body);
            color: var(--text-primary);
            backdrop-filter: blur(0px);
        }

        /* Glassmorphism / Minimal Layout */
        .app-container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Header Controls */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 30px;
            background: var(--bg-panel);
            backdrop-filter: blur(12px);
            padding: 16px 24px;
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
        }
        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        button, .btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-primary);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        button:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        select {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 40px;
            color: var(--text-primary);
            font-weight: 500;
            cursor: pointer;
        }

        /* Main Grid */
        .builder-grid {
            display: grid;
            grid-template-columns: 1fr 1.1fr;
            gap: 28px;
        }
        @media (max-width: 900px) {
            .builder-grid {
                grid-template-columns: 1fr;
                gap: 24px;
            }
        }

        /* Form Panel (Left) */
        .form-panel {
            background: var(--bg-panel);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
            height: 85vh;
            overflow-y: auto;
        }
        .form-section {
            margin-bottom: 28px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 18px;
        }
        .form-section h3 {
            font-size: 1.2rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input, textarea {
            width: 100%;
            padding: 10px 14px;
            margin-top: 6px;
            margin-bottom: 12px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-primary);
            font-family: inherit;
        }
        .dynamic-entry {
            background: var(--card-bg);
            padding: 12px;
            border-radius: 24px;
            margin-bottom: 14px;
            border: 1px solid var(--border);
        }
        .add-btn {
            background: transparent;
            border: 1px dashed var(--accent);
            color: var(--accent);
            width: 100%;
            justify-content: center;
            margin-top: 8px;
        }
        .remove-item {
            background: transparent;
            border: none;
            color: #ef4444;
            padding: 4px;
            font-size: 0.8rem;
        }

        /* Preview Panel (Right) */
        .preview-panel {
            background: var(--bg-panel);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
            height: 85vh;
            overflow-y: auto;
        }
        .resume-card {
            background: var(--card-bg);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        /* Two column layout inside preview */
        .resume-layout {
            display: flex;
            flex-wrap: wrap;
        }
        .resume-left {
            background: rgba(59,130,246,0.05);
            flex: 1.2;
            padding: 24px;
            border-right: 1px solid var(--border);
        }
        .resume-right {
            flex: 2.2;
            padding: 24px;
        }
        /* Template variations */
        .template-modern .resume-left {
            background: linear-gradient(145deg, rgba(59,130,246,0.08), rgba(139,92,246,0.05));
        }
        .template-classic .resume-left {
            background: var(--card-bg);
            border-right: 3px solid var(--accent);
        }
        .preview-name {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .preview-photo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent);
            margin-bottom: 18px;
        }
        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            border-left: 4px solid var(--accent);
            padding-left: 12px;
            margin: 18px 0 12px 0;
        }
        .skill-tag {
            background: var(--bg-body);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            margin: 4px 6px 4px 0;
            font-size: 0.8rem;
        }
        hr {
            border-color: var(--border);
        }
        /* drag handle */
        .drag-handle {
            cursor: grab;
            font-size: 0.8rem;
            margin-right: 8px;
            color: var(--accent);
        }
        .sortable-section {
            margin-bottom: 18px;
            background: var(--card-bg);
            border-radius: 18px;
            padding: 4px 8px;
        }
        .sortable-section.dragging {
            opacity: 0.5;
        }
        .print-only { display: none; }
        @media print {
            body * { visibility: hidden; }
            .resume-card, .resume-card * { visibility: visible; }
            .resume-card { position: absolute; top: 0; left: 0; width: 100%; margin: 0; }
            .toolbar, .form-panel { display: none; }
        }
    </style>
</head>
<body class="light">
<div class="app-container">
    <!-- Toolbar -->
    <div class="toolbar">
        <div class="logo"><i class="fas fa-file-alt"></i> NovaResume</div>
        <div class="btn-group">
            <select id="templateSelect">
                <option value="modern">✨ Modern Glass</option>
                <option value="classic">📜 Classic Elegant</option>
            </select>
            <button id="themeToggle"><i class="fas fa-moon"></i> Dark/Light</button>
            <button id="resetBtn"><i class="fas fa-undo-alt"></i> Reset</button>
            <button id="downloadPDF"><i class="fas fa-file-pdf"></i> PDF</button>
            <button id="downloadDOCX"><i class="fas fa-file-word"></i> DOCX</button>
        </div>
    </div>

    <div class="builder-grid">
        <!-- LEFT: Form Inputs -->
        <div class="form-panel">
            <div class="form-section">
                <h3><i class="fas fa-user-circle"></i> Personal Details</Details></h3>
                <input type="text" id="fullName" placeholder="Full Name" value="Abc Kumar">
                <label>Profile Photo</label>
                <input type="file" id="photoUpload" accept="image/*">
                <input type="tel" id="phone" placeholder="Phone" value="+91 2340 567 890">
                <input type="email" id="email" placeholder="Email" value="abc@example.com">
                <input type="text" id="address" placeholder="Address" value="Siwan Bihar, India">
                <textarea id="careerObjective" rows="2" placeholder="Career Objective / Summary">Innovative product designer with 5+ years of experience crafting human-centered digital experiences. Passionate about design systems and AI.</textarea>
            </div>

            <div class="form-section">
                <h3><i class="fas fa-graduation-cap"></i> Education</h3>
                <div id="educationContainer"></div>
                <button type="button" id="addEducationBtn" class="add-btn"><i class="fas fa-plus"></i> Add Education</button>
            </div>

            <div class="form-section">
                <h3><i class="fas fa-code"></i> Skills</h3>
                <div id="skillsContainer"></div>
                <button type="button" id="addSkillBtn" class="add-btn"><i class="fas fa-plus"></i> Add Skill</button>
            </div>

            <div class="form-section">
                <h3><i class="fas fa-briefcase"></i> Work Experience</h3>
                <div id="workContainer"></div>
                <button type="button" id="addWorkBtn" class="add-btn"><i class="fas fa-plus"></i> Add Experience</button>
            </div>

            <div class="form-section">
                <h3><i class="fas fa-laptop-code"></i> Projects</h3>
                <div id="projectsContainer"></div>
                <button type="button" id="addProjectBtn" class="add-btn"><i class="fas fa-plus"></i> Add Project</button>
            </div>

            <div class="form-section">
                <h3><i class="fas fa-certificate"></i> Certifications</h3>
                <div id="certificationsContainer"></div>
                <button type="button" id="addCertBtn" class="add-btn"><i class="fas fa-plus"></i> Add Certification</button>
            </div>
        </div>

        <!-- RIGHT: Live Preview + Drag Drop Reorder -->
        <div class="preview-panel">
            <div class="resume-card" id="resumePreviewCard">
                <!-- dynamic preview injected here -->
            </div>
            <div style="margin-top: 12px; font-size: 12px; text-align: center; opacity: 0.6;">
                <i class="fas fa-arrows-alt"></i> Drag the ⋮⋮ icons to reorder sections on the right column
            </div>
        </div>
    </div>
</div>

<script>
    // ---------- GLOBAL STATE ----------
    let state = {
        fullName: "Alex Morgan",
        photoDataURL: "",
        phone: "+1 234 567 890",
        email: "alex@example.com",
        address: "San Francisco, CA",
        careerObjective: "Innovative product designer with 5+ years of experience crafting human-centered digital experiences. Passionate about design systems and AI.",
        education: [{ degree: "B.Sc. Computer Science", institution: "Stanford University", year: "2020" }],
        skills: ["UI/UX Design", "Figma", "React", "JavaScript"],
        workExperience: [{ title: "Senior Designer", company: "Creative Studio", dates: "2022 - Present", description: "Lead product design and design system." }],
        projects: [{ name: "Portfolio 2025", description: "Modern resume builder app with glassmorphism." }],
        certifications: [{ name: "Google UX Certificate", issuer: "Google", year: "2023" }],
        template: "modern",
        theme: "light",
        // order for right column sections: IDs: career, education, work, projects, certs? but certifications on left? we will reorder right column only (Career, Education, Work, Projects)
        rightSectionOrder: ["career", "education", "work", "projects"] 
    };

    // Helper: Save to localStorage & render preview
    function persistState() {
        const toStore = { ...state };
        delete toStore.photoDataURL; // avoid huge but we store photo separately
        localStorage.setItem("resumeState", JSON.stringify(toStore));
        if (state.photoDataURL) localStorage.setItem("resumePhoto", state.photoDataURL);
        else localStorage.removeItem("resumePhoto");
    }

    function loadFromStorage() {
        const saved = localStorage.getItem("resumeState");
        if (saved) {
            const parsed = JSON.parse(saved);
            Object.assign(state, parsed);
            const savedPhoto = localStorage.getItem("resumePhoto");
            if (savedPhoto) state.photoDataURL = savedPhoto;
            else state.photoDataURL = "";
        }
        // ensure arrays exist
        if (!state.education) state.education = [];
        if (!state.skills) state.skills = [];
        if (!state.workExperience) state.workExperience = [];
        if (!state.projects) state.projects = [];
        if (!state.certifications) state.certifications = [];
        if (!state.rightSectionOrder) state.rightSectionOrder = ["career", "education", "work", "projects"];
        applyTheme();
        renderAllForms();
        renderPreview();
    }

    // Theme & Template
    function applyTheme() {
        document.body.classList.remove("light", "dark");
        document.body.classList.add(state.theme);
    }
    function toggleTheme() {
        state.theme = state.theme === "light" ? "dark" : "light";
        applyTheme();
        persistState();
        renderPreview(); // update colors
    }
    function setTemplate(tpl) {
        state.template = tpl;
        persistState();
        renderPreview();
    }

    // Dynamic Form Rendering (Education, Skills, Work, Projects, Certs)
    function renderAllForms() {
        renderEducationForm();
        renderSkillsForm();
        renderWorkForm();
        renderProjectsForm();
        renderCertificationsForm();
        attachBasicInputs();
    }

    function attachBasicInputs() {
        document.getElementById("fullName").value = state.fullName;
        document.getElementById("phone").value = state.phone;
        document.getElementById("email").value = state.email;
        document.getElementById("address").value = state.address;
        document.getElementById("careerObjective").value = state.careerObjective;
        // photo preview
        const photoInput = document.getElementById("photoUpload");
        photoInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => { state.photoDataURL = ev.target.result; persistState(); renderPreview(); };
                reader.readAsDataURL(file);
            }
        };
    }

    function renderEducationForm() {
        const container = document.getElementById("educationContainer");
        container.innerHTML = "";
        state.education.forEach((edu, idx) => {
            const div = document.createElement("div");
            div.className = "dynamic-entry";
            div.innerHTML = `
                <input type="text" placeholder="Degree" value="${escapeHtml(edu.degree)}" data-edu-degree="${idx}">
                <input type="text" placeholder="Institution" value="${escapeHtml(edu.institution)}" data-edu-inst="${idx}">
                <input type="text" placeholder="Year" value="${escapeHtml(edu.year)}" data-edu-year="${idx}">
                <button class="remove-item" data-edu-remove="${idx}"><i class="fas fa-trash-alt"></i> Remove</button>
            `;
            container.appendChild(div);
        });
        document.querySelectorAll("[data-edu-degree]").forEach(inp => inp.addEventListener("input", updateEduField));
        document.querySelectorAll("[data-edu-inst]").forEach(inp => inp.addEventListener("input", updateEduField));
        document.querySelectorAll("[data-edu-year]").forEach(inp => inp.addEventListener("input", updateEduField));
        document.querySelectorAll("[data-edu-remove]").forEach(btn => btn.addEventListener("click", (e) => { let idx = parseInt(btn.dataset.eduRemove); state.education.splice(idx,1); renderAllForms(); renderPreview(); persistState(); }));
    }
    function updateEduField(e) {
        const key = e.target.getAttribute("data-edu-degree") ? "degree" : e.target.getAttribute("data-edu-inst") ? "institution" : "year";
        const idx = parseInt(e.target.getAttribute(key === "degree" ? "data-edu-degree" : key === "institution" ? "data-edu-inst" : "data-edu-year"));
        if (!isNaN(idx) && state.education[idx]) { state.education[idx][key] = e.target.value; renderPreview(); persistState(); }
    }

    function renderSkillsForm() {
        const container = document.getElementById("skillsContainer");
        container.innerHTML = "";
        state.skills.forEach((skill, idx) => {
            const div = document.createElement("div");
            div.className = "dynamic-entry";
            div.innerHTML = `<input type="text" value="${escapeHtml(skill)}" data-skill="${idx}"><button class="remove-item" data-skill-remove="${idx}"><i class="fas fa-minus-circle"></i></button>`;
            container.appendChild(div);
        });
        document.querySelectorAll("[data-skill]").forEach(inp => inp.addEventListener("input", (e) => { let idx = parseInt(inp.dataset.skill); state.skills[idx] = inp.value; renderPreview(); persistState(); }));
        document.querySelectorAll("[data-skill-remove]").forEach(btn => btn.addEventListener("click", (e) => { let idx = parseInt(btn.dataset.skillRemove); state.skills.splice(idx,1); renderAllForms(); renderPreview(); persistState(); }));
    }

    function renderWorkForm() {
        const container = document.getElementById("workContainer");
        container.innerHTML = "";
        state.workExperience.forEach((work, idx) => {
            const div = document.createElement("div");
            div.className = "dynamic-entry";
            div.innerHTML = `
                <input type="text" placeholder="Title" value="${escapeHtml(work.title)}" data-work-title="${idx}">
                <input type="text" placeholder="Company" value="${escapeHtml(work.company)}" data-work-company="${idx}">
                <input type="text" placeholder="Dates" value="${escapeHtml(work.dates)}" data-work-dates="${idx}">
                <textarea placeholder="Description" data-work-desc="${idx}">${escapeHtml(work.description)}</textarea>
                <button class="remove-item" data-work-remove="${idx}"><i class="fas fa-trash"></i> Remove</button>
            `;
            container.appendChild(div);
        });
        attachWorkEvents();
    }
    function attachWorkEvents() {
        document.querySelectorAll("[data-work-title]").forEach(inp => inp.addEventListener("input", (e) => { let idx=parseInt(inp.dataset.workTitle); state.workExperience[idx].title=inp.value; renderPreview(); persistState(); }));
        document.querySelectorAll("[data-work-company]").forEach(inp => inp.addEventListener("input", (e) => { let idx=parseInt(inp.dataset.workCompany); state.workExperience[idx].company=inp.value; renderPreview(); persistState(); }));
        document.querySelectorAll("[data-work-dates]").forEach(inp => inp.addEventListener("input", (e) => { let idx=parseInt(inp.dataset.workDates); state.workExperience[idx].dates=inp.value; renderPreview(); persistState(); }));
        document.querySelectorAll("[data-work-desc]").forEach(inp => inp.addEventListener("input", (e) => { let idx=parseInt(inp.dataset.workDesc); state.workExperience[idx].description=inp.value; renderPreview(); persistState(); }));
        document.querySelectorAll("[data-work-remove]").forEach(btn => btn.addEventListener("click", (e) => { let idx=parseInt(btn.dataset.workRemove); state.workExperience.splice(idx,1); renderAllForms(); renderPreview(); persistState(); }));
    }
    function renderProjectsForm() {
        const container = document.getElementById("projectsContainer");
        container.innerHTML = "";
        state.projects.forEach((proj, idx) => {
            const div = document.createElement("div");
            div.className = "dynamic-entry";
            div.innerHTML = `<input placeholder="Project Name" value="${escapeHtml(proj.name)}" data-proj-name="${idx}"><textarea placeholder="Description" data-proj-desc="${idx}">${escapeHtml(proj.description)}</textarea><button class="remove-item" data-proj-remove="${idx}"><i class="fas fa-trash"></i></button>`;
            container.appendChild(div);
        });
        document.querySelectorAll("[data-proj-name]").forEach(inp => inp.addEventListener("input", (e) => { let idx=parseInt(inp.dataset.projName); state.projects[idx].name=inp.value; renderPreview(); persistState(); }));
        document.querySelectorAll("[data-proj-desc]").forEach(inp => inp.addEventListener("input", (e) => { let idx=parseInt(inp.dataset.projDesc); state.projects[idx].description=inp.value; renderPreview(); persistState(); }));
        document.querySelectorAll("[data-proj-remove]").forEach(btn => btn.addEventListener("click", (e) => { let idx=parseInt(btn.dataset.projRemove); state.projects.splice(idx,1); renderAllForms(); renderPreview(); persistState(); }));
    }
    function renderCertificationsForm() {
        const container = document.getElementById("certificationsContainer");
        container.innerHTML = "";
        state.certifications.forEach((cert, idx) => {
            const div = document.createElement("div");
            div.className = "dynamic-entry";
            div.innerHTML = `<input placeholder="Certification Name" value="${escapeHtml(cert.name)}" data-cert-name="${idx}"><input placeholder="Issuer" value="${escapeHtml(cert.issuer)}" data-cert-issuer="${idx}"><input placeholder="Year" value="${escapeHtml(cert.year)}" data-cert-year="${idx}"><button class="remove-item" data-cert-remove="${idx}"><i class="fas fa-trash"></i></button>`;
            container.appendChild(div);
        });
        document.querySelectorAll("[data-cert-name]").forEach(inp => inp.addEventListener("input", (e) => { let idx=parseInt(inp.dataset.certName); state.certifications[idx].name=inp.value; renderPreview(); persistState(); }));
        document.querySelectorAll("[data-cert-issuer]").forEach(inp => inp.addEventListener("input", (e) => { let idx=parseInt(inp.dataset.certIssuer); state.certifications[idx].issuer=inp.value; renderPreview(); persistState(); }));
        document.querySelectorAll("[data-cert-year]").forEach(inp => inp.addEventListener("input", (e) => { let idx=parseInt(inp.dataset.certYear); state.certifications[idx].year=inp.value; renderPreview(); persistState(); }));
        document.querySelectorAll("[data-cert-remove]").forEach(btn => btn.addEventListener("click", (e) => { let idx=parseInt(btn.dataset.certRemove); state.certifications.splice(idx,1); renderAllForms(); renderPreview(); persistState(); }));
    }

    function addEducation() { state.education.push({ degree: "", institution: "", year: "" }); renderAllForms(); renderPreview(); persistState(); }
    function addSkill() { state.skills.push("New Skill"); renderAllForms(); renderPreview(); persistState(); }
    function addWork() { state.workExperience.push({ title: "", company: "", dates: "", description: "" }); renderAllForms(); renderPreview(); persistState(); }
    function addProject() { state.projects.push({ name: "", description: "" }); renderAllForms(); renderPreview(); persistState(); }
    function addCert() { state.certifications.push({ name: "", issuer: "", year: "" }); renderAllForms(); renderPreview(); persistState(); }

    // ----- PREVIEW RENDER with Drag & Drop (right column sections) -----
    let sortableInstance = null;
    function renderPreview() {
        const container = document.getElementById("resumePreviewCard");
        const templateClass = state.template === "modern" ? "template-modern" : "template-classic";
        // left column data
        const photoHtml = state.photoDataURL ? `<img src="${state.photoDataURL}" class="preview-photo" alt="profile">` : `<div class="preview-photo" style="background: var(--border); display:flex; align-items:center; justify-content:center;"><i class="fas fa-user fa-3x"></i></div>`;
        const skillsHtml = `<div class="section-title"><i class="fas fa-cogs"></i> Skills</div><div>${state.skills.map(s => `<span class="skill-tag">${escapeHtml(s)}</span>`).join('') || '—'}</div>`;
        const certsHtml = `<div class="section-title"><i class="fas fa-award"></i> Certifications</div><div>${state.certifications.map(c => `<div><strong>${escapeHtml(c.name)}</strong> – ${escapeHtml(c.issuer)} (${escapeHtml(c.year)})</div>`).join('') || '—'}</div>`;
        
        const leftPanel = `
            <div class="resume-left">
                ${photoHtml}
                <div class="preview-name">${escapeHtml(state.fullName)}</div>
                <div><i class="fas fa-phone-alt"></i> ${escapeHtml(state.phone)}</div>
                <div><i class="fas fa-envelope"></i> ${escapeHtml(state.email)}</div>
                <div><i class="fas fa-map-marker-alt"></i> ${escapeHtml(state.address)}</div>
                <hr>
                ${skillsHtml}
                <hr>
                ${certsHtml}
            </div>
        `;

        // Right column dynamic order from state.rightSectionOrder
        const sectionMap = {
            career: `<div class="sortable-section" data-section-id="career"><div class="section-title"><i class="fas fa-drag-handle drag-handle">⋮⋮</i> Career Objective</div><p>${escapeHtml(state.careerObjective)}</p></div>`,
            education: `<div class="sortable-section" data-section-id="education"><div class="section-title"><i class="fas fa-drag-handle drag-handle">⋮⋮</i> Education</div>${state.education.map(e => `<div><strong>${escapeHtml(e.degree)}</strong> - ${escapeHtml(e.institution)} (${escapeHtml(e.year)})</div>`).join('') || '<em>No education added</em>'}</div>`,
            work: `<div class="sortable-section" data-section-id="work"><div class="section-title"><i class="fas fa-drag-handle drag-handle">⋮⋮</i> Work Experience</div>${state.workExperience.map(w => `<div><strong>${escapeHtml(w.title)}</strong> @ ${escapeHtml(w.company)} (${escapeHtml(w.dates)})<br><small>${escapeHtml(w.description)}</small></div><br>`).join('') || '<em>—</em>'}</div>`,
            projects: `<div class="sortable-section" data-section-id="projects"><div class="section-title"><i class="fas fa-drag-handle drag-handle">⋮⋮</i> Projects</div>${state.projects.map(p => `<div><strong>${escapeHtml(p.name)}</strong><br>${escapeHtml(p.description)}</div><br>`).join('') || '<em>—</em>'}</div>`
        };
        let rightSectionsHtml = "";
        for (let id of state.rightSectionOrder) {
            if (sectionMap[id]) rightSectionsHtml += sectionMap[id];
        }
        const rightPanel = `<div class="resume-right" id="sortableRightContainer">${rightSectionsHtml}</div>`;
        const finalHtml = `<div class="resume-layout ${templateClass}">${leftPanel}${rightPanel}</div>`;
        container.innerHTML = finalHtml;

        // reinitialize sortable on right container
        const rightContainer = document.getElementById("sortableRightContainer");
        if (rightContainer && !sortableInstance) {
            sortableInstance = new Sortable(rightContainer, {
                animation: 250,
                handle: '.drag-handle',
                onEnd: function(evt) {
                    const children = Array.from(rightContainer.querySelectorAll('.sortable-section'));
                    const newOrder = children.map(el => el.getAttribute("data-section-id"));
                    if (JSON.stringify(newOrder) !== JSON.stringify(state.rightSectionOrder)) {
                        state.rightSectionOrder = newOrder;
                        persistState();
                        renderPreview(); // re-render to persist order
                    }
                }
            });
        } else if (rightContainer && sortableInstance) {
            sortableInstance.option("disabled", false);
            sortableInstance.sort = true;
        }
        // add listeners for inputs sync: already via attach
    }

    // reset
    function resetAll() {
        state = {
            fullName: "Alex Morgan", photoDataURL: "", phone: "+1 234 567 890", email: "alex@example.com", address: "San Francisco, CA",
            careerObjective: "Innovative product designer with 5+ years of experience.",
            education: [{ degree: "B.Sc. Computer Science", institution: "Stanford University", year: "2020" }],
            skills: ["UI/UX Design", "Figma", "React"],
            workExperience: [{ title: "Senior Designer", company: "Creative Studio", dates: "2022 - Present", description: "Lead product design." }],
            projects: [{ name: "Portfolio", description: "Modern resume builder." }],
            certifications: [{ name: "Google UX", issuer: "Google", year: "2023" }],
            template: state.template,
            theme: state.theme,
            rightSectionOrder: ["career", "education", "work", "projects"]
        };
        localStorage.removeItem("resumePhoto");
        persistState();
        renderAllForms();
        renderPreview();
    }

    function downloadDOCX() {
        const content = document.getElementById("resumePreviewCard").cloneNode(true);
        const style = document.createElement("style");
        style.textContent = `body { font-family: 'Segoe UI', Arial; padding: 20px; } .resume-layout{display:flex;} .resume-left{width:35%;} .resume-right{width:65%;}`;
        content.prepend(style);
        const htmlContent = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Resume</title></head><body>${content.outerHTML}</body></html>`;
        const blob = new Blob([htmlContent], { type: "application/msword" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "resume.doc";
        link.click();
        URL.revokeObjectURL(link.href);
    }

    function downloadPDF() { window.print(); }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // Event listeners
    document.getElementById("addEducationBtn").onclick = addEducation;
    document.getElementById("addSkillBtn").onclick = addSkill;
    document.getElementById("addWorkBtn").onclick = addWork;
    document.getElementById("addProjectBtn").onclick = addProject;
    document.getElementById("addCertBtn").onclick = addCert;
    document.getElementById("resetBtn").onclick = resetAll;
    document.getElementById("themeToggle").onclick = toggleTheme;
    document.getElementById("templateSelect").onchange = (e) => setTemplate(e.target.value);
    document.getElementById("downloadPDF").onclick = downloadPDF;
    document.getElementById("downloadDOCX").onclick = downloadDOCX;

    function syncBasicFields() {
        state.fullName = document.getElementById("fullName").value;
        state.phone = document.getElementById("phone").value;
        state.email = document.getElementById("email").value;
        state.address = document.getElementById("address").value;
        state.careerObjective = document.getElementById("careerObjective").value;
        renderPreview(); persistState();
    }
    document.getElementById("fullName").addEventListener("input", syncBasicFields);
    document.getElementById("phone").addEventListener("input", syncBasicFields);
    document.getElementById("email").addEventListener("input", syncBasicFields);
    document.getElementById("address").addEventListener("input", syncBasicFields);
    document.getElementById("careerObjective").addEventListener("input", syncBasicFields);

    loadFromStorage();
    renderAllForms();
    renderPreview();
</script>
</body>
</html>
