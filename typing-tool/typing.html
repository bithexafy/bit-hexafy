<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Bithexafy Typing | Futuristic Typing Practice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* style.css - Bithexafy Typing */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none; /* cleaner selection, but typing works */
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: background 0.3s ease, color 0.2s ease;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
    }

    /* DARK THEME (default) */
    :root {
      --bg-primary: #0a0a12;
      --bg-secondary: #0f0f1a;
      --bg-card: rgba(18, 18, 30, 0.7);
      --text-primary: #eef2ff;
      --text-secondary: #8b8d9e;
      --accent-blue: #3b82f6;
      --accent-purple: #a855f7;
      --accent-glow: rgba(59, 130, 246, 0.4);
      --correct: #2dd4bf;
      --wrong: #f43f5e;
      --current: #facc15;
      --border-light: rgba(255, 255, 255, 0.08);
      --shadow-xl: 0 25px 45px -12px rgba(0, 0, 0, 0.5);
      --mistake-color: #ff8c8c;
    }

    body.light {
      --bg-primary: #f4f6fc;
      --bg-secondary: #ffffff;
      --bg-card: rgba(255, 255, 255, 0.85);
      --text-primary: #111827;
      --text-secondary: #4b5563;
      --accent-blue: #2563eb;
      --accent-purple: #9333ea;
      --border-light: rgba(0, 0, 0, 0.08);
      --shadow-xl: 0 25px 45px -12px rgba(0, 0, 0, 0.15);
    }

    .app-container {
      width: 100%;
      max-width: 1400px;
      margin: 2rem;
      padding: 1.5rem;
      backdrop-filter: blur(2px);
    }

    /* header & top bar */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1.5rem;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border-light);
    }

    .logo h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }

    .logo p {
      font-size: 0.75rem;
      color: var(--text-secondary);
      letter-spacing: 1px;
    }

    .controls {
      display: flex;
      gap: 1.2rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .timer-modes {
      display: flex;
      gap: 0.6rem;
      background: var(--bg-secondary);
      padding: 0.3rem;
      border-radius: 60px;
      backdrop-filter: blur(4px);
    }

    .mode-btn {
      background: transparent;
      border: none;
      padding: 0.5rem 1.2rem;
      font-family: 'Inter', monospace;
      font-weight: 600;
      font-size: 0.9rem;
      border-radius: 40px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.2s;
    }

    .mode-btn.active {
      background: var(--accent-blue);
      color: white;
      box-shadow: 0 0 8px var(--accent-glow);
    }

    .icon-btn {
      background: var(--bg-secondary);
      border: 1px solid var(--border-light);
      border-radius: 40px;
      padding: 0.5rem 1rem;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.2s;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
    }

    .stats-grid {
      display: flex;
      justify-content: space-between;
      gap: 1.5rem;
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 1rem 2rem;
      margin-bottom: 2rem;
      border: 1px solid var(--border-light);
      flex-wrap: wrap;
    }

    .stat {
      text-align: center;
      flex: 1;
    }

    .stat-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      background: linear-gradient(145deg, var(--accent-blue), var(--accent-purple));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* word container */
    .typing-area {
      background: var(--bg-card);
      border-radius: 2rem;
      padding: 2rem;
      margin: 1rem 0;
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-xl);
      transition: all 0.2s;
    }

    .words-wrapper {
      min-height: 200px;
      max-height: 280px;
      overflow-y: auto;
      padding: 0.5rem;
      scroll-behavior: smooth;
    }

    .words-container {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1.2rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.9rem;
      font-weight: 500;
      line-height: 1.4;
    }

    .word {
      display: inline-flex;
      gap: 0.1rem;
      background: transparent;
      transition: all 0.1s;
      border-radius: 12px;
      padding: 0.1rem 0.2rem;
    }

    .word.mistake {
      background: rgba(244, 63, 94, 0.15);
      border-radius: 10px;
    }

    .char {
      display: inline-block;
      transition: all 0.05s linear;
    }

    .char.correct {
      color: var(--correct);
      text-shadow: 0 0 4px rgba(45, 212, 191, 0.3);
    }

    .char.wrong {
      color: var(--wrong);
      text-decoration: underline;
      text-decoration-thickness: 2px;
    }

    .char.current {
      color: var(--current);
      background: rgba(250, 204, 21, 0.2);
      border-radius: 4px;
      box-shadow: 0 0 6px var(--current);
      animation: blinkCursor 1s step-end infinite;
    }

    @keyframes blinkCursor {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* progress bar */
    .progress-section {
      margin-top: 1.5rem;
    }
    .progress-bar-bg {
      background: var(--border-light);
      height: 5px;
      border-radius: 8px;
      overflow: hidden;
    }
    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
      transition: width 0.1s linear;
    }

    /* result overlay */
    .result-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: all 0.3s ease;
    }
    .result-overlay.show {
      visibility: visible;
      opacity: 1;
    }
    .result-card {
      background: var(--bg-secondary);
      border-radius: 2rem;
      padding: 2.5rem;
      text-align: center;
      max-width: 400px;
      width: 90%;
      border: 1px solid var(--border-light);
      transform: scale(0.95);
      transition: transform 0.2s;
    }
    .result-overlay.show .result-card {
      transform: scale(1);
    }
    .result-card h2 {
      font-size: 2rem;
      margin-bottom: 1.5rem;
    }
    .result-stats {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      margin: 1.5rem 0;
    }
    .restart-result-btn {
      background: var(--accent-blue);
      border: none;
      padding: 0.8rem 2rem;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      font-size: 1rem;
    }

    /* footer shortcuts */
    .shortcuts-tip {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 1.5rem;
    }

    /* hidden input */
    #ghost-input {
      position: fixed;
      top: -100px;
      left: -100px;
      opacity: 0;
      pointer-events: none;
    }

    /* scrollbar */
    .words-wrapper::-webkit-scrollbar {
      width: 6px;
    }
    .words-wrapper::-webkit-scrollbar-track {
      background: var(--border-light);
      border-radius: 8px;
    }
    .words-wrapper::-webkit-scrollbar-thumb {
      background: var(--accent-purple);
      border-radius: 8px;
    }

    @media (max-width: 700px) {
      .words-container { font-size: 1.4rem; gap: 0.5rem; }
      .stat-value { font-size: 1.4rem; }
      .stats-grid { padding: 0.8rem; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="top-bar">
    <div class="logo">
      <h1>BITHEXAFY TYPING</h1>
      <p>precision · speed · flow</p>
    </div>
    <div class="controls">
      <div class="timer-modes">
        <button class="mode-btn" data-time="15">15s</button>
        <button class="mode-btn active" data-time="30">30s</button>
        <button class="mode-btn" data-time="60">60s</button>
      </div>
      <button class="icon-btn" id="themeToggleBtn">🌙 Dark</button>
      <button class="icon-btn" id="soundToggleBtn">🔊 Sound ON</button>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat"><div class="stat-label">WPM</div><div class="stat-value" id="wpmValue">0</div></div>
    <div class="stat"><div class="stat-label">ACCURACY</div><div class="stat-value" id="accValue">100%</div></div>
    <div class="stat"><div class="stat-label">ERRORS</div><div class="stat-value" id="errorsValue">0</div></div>
    <div class="stat"><div class="stat-label">CHARS</div><div class="stat-value" id="charsValue">0</div></div>
  </div>

  <div class="typing-area">
    <div class="words-wrapper" id="wordsWrapper">
      <div class="words-container" id="wordsContainer"></div>
    </div>
    <div class="progress-section">
      <div class="progress-bar-bg"><div class="progress-fill" id="timerProgress"></div></div>
    </div>
  </div>
  <div class="shortcuts-tip">
    ⚡ TAB / ESC to restart | Focus anywhere & type
  </div>
</div>

<div id="resultOverlay" class="result-overlay">
  <div class="result-card">
    <h2>⚡ session complete</h2>
    <div class="result-stats">
      <div><strong>WPM</strong><br><span id="finalWpm">0</span></div>
      <div><strong>Accuracy</strong><br><span id="finalAcc">0%</span></div>
      <div><strong>Errors</strong><br><span id="finalErrors">0</span></div>
    </div>
    <button class="restart-result-btn" id="resultRestartBtn">↻ New Test</button>
  </div>
</div>

<input type="text" id="ghost-input" autocomplete="off">

<script>
  // ---------- script.js ----------
  // Word bank (300+ unique words)
  const WORD_BANK = [
    "the", "be", "to", "of", "and", "a", "in", "that", "have", "i", "it", "for", "not", "on", "with", "he", "as", "you", "do", "at", "this", "but", "his", "by", "from", "they", "we", "say", "her", "she", "or", "an", "will", "my", "one", "all", "would", "there", "their", "what", "so", "up", "out", "if", "about", "who", "get", "which", "go", "me", "when", "make", "can", "like", "time", "no", "just", "him", "know", "take", "people", "into", "year", "your", "good", "some", "could", "them", "see", "other", "than", "then", "now", "look", "only", "come", "its", "over", "think", "also", "back", "after", "use", "two", "how", "our", "work", "first", "well", "way", "even", "new", "want", "because", "any", "these", "give", "day", "most", "us", "very", "through", "just", "form", "sentence", "great", "think", "say", "help", "low", "line", "differ", "turn", "cause", "much", "mean", "before", "move", "right", "boy", "old", "too", "same", "tell", "does", "set", "three", "want", "air", "well", "also", "play", "small", "end", "put", "home", "read", "hand", "port", "large", "spell", "add", "even", "land", "here", "must", "big", "high", "such", "follow", "act", "why", "ask", "men", "change", "went", "light", "kind", "off", "need", "house", "picture", "try", "us", "again", "animal", "point", "mother", "world", "near", "build", "self", "earth", "father", "head", "stand", "own", "page", "should", "country", "found", "answer", "school", "grow", "study", "still", "learn", "plant", "cover", "food", "sun", "four", "between", "state", "keep", "eye", "never", "last", "let", "thought", "city", "tree", "cross", "farm", "hard", "start", "might", "story", "saw", "far", "sea", "draw", "left", "late", "run", "don't", "while", "press", "close", "night", "real", "life", "few", "north", "book", "carry", "took", "science", "eat", "room", "friend", "began", "idea", "fish", "mountain", "stop", "once", "base", "hear", "horse", "cut", "sure", "watch", "color", "face", "wood", "main", "open", "seem", "together", "next", "white", "children", "begin", "got", "walk", "example", "ease", "paper", "group", "always", "music", "those", "both", "mark", "often", "letter", "until", "mile", "river", "car", "feet", "care", "second", "book", "carry", "took", "science", "eat"
  ];
  
  function getRandomWords(count = 120) {
    let shuffled = [...WORD_BANK];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    let result = [];
    while (result.length < count) result.push(...shuffled);
    return result.slice(0, count);
  }

  // DOM elements
  const wordsContainer = document.getElementById('wordsContainer');
  const wpmSpan = document.getElementById('wpmValue');
  const accSpan = document.getElementById('accValue');
  const errorsSpan = document.getElementById('errorsValue');
  const charsSpan = document.getElementById('charsValue');
  const timerProgressFill = document.getElementById('timerProgress');
  const ghostInput = document.getElementById('ghost-input');
  const resultOverlay = document.getElementById('resultOverlay');
  const finalWpmSpan = document.getElementById('finalWpm');
  const finalAccSpan = document.getElementById('finalAcc');
  const finalErrorsSpan = document.getElementById('finalErrors');
  
  // State
  let wordsList = [];         // array of strings
  let wordElements = [];      // DOM .word elements
  let charSpansPerWord = [];  // array of arrays of char spans
  let wordMistakeFlags = [];   // track per word mistake
  let currentWordIdx = 0;
  let currentCharIdx = 0;
  let testActive = false;
  let timerInterval = null;
  let timeLeft = 30;
  let selectedTime = 30;
  let startTime = null;
  let correctChars = 0;
  let errorCount = 0;
  let totalTyped = 0; // total key presses (letters/spaces valid)
  let soundEnabled = true;
  let audioCtx = null;
  
  // Helper: init audio on first interaction
  function initAudio() {
    if (!audioCtx && soundEnabled) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }
  function playBeep(isError = false) {
    if (!soundEnabled) return;
    try {
      initAudio();
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = isError ? 620 : 880;
      gain.gain.value = 0.08;
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.1);
      osc.stop(audioCtx.currentTime + 0.1);
    } catch(e) { /* silent */ }
  }
  
  // Render words from wordsList
  function renderWords() {
    wordsContainer.innerHTML = '';
    wordElements = [];
    charSpansPerWord = [];
    wordMistakeFlags = new Array(wordsList.length).fill(false);
    for (let wIdx = 0; wIdx < wordsList.length; wIdx++) {
      const word = wordsList[wIdx];
      const wordSpan = document.createElement('span');
      wordSpan.className = 'word';
      const chars = word.split('');
      const charSpans = [];
      for (let cIdx = 0; cIdx < chars.length; cIdx++) {
        const charSpan = document.createElement('span');
        charSpan.className = 'char';
        charSpan.textContent = chars[cIdx];
        wordSpan.appendChild(charSpan);
        charSpans.push(charSpan);
      }
      wordsContainer.appendChild(wordSpan);
      wordElements.push(wordSpan);
      charSpansPerWord.push(charSpans);
    }
    updateActiveWordHighlight();
  }
  
  function updateActiveWordHighlight() {
    // reset all word classes and char classes
    for (let i = 0; i < wordElements.length; i++) {
      wordElements[i].classList.remove('mistake');
      if (wordMistakeFlags[i]) wordElements[i].classList.add('mistake');
      for (let c = 0; c < charSpansPerWord[i].length; c++) {
        const span = charSpansPerWord[i][c];
        span.classList.remove('correct', 'wrong', 'current');
      }
    }
    if (!testActive && timeLeft === 0) return;
    if (currentWordIdx >= wordsList.length) return;
    // mark current word chars based on typed progress (virtual typed string tracked via currentCharIdx)
    const currentWordChars = charSpansPerWord[currentWordIdx];
    // we don't have typed string stored fully, we use state from currentCharIdx and mistakes per char? simpler: we compare from the global input state: we store typed per char for current word? 
    // For letter coloring we need to know which chars are typed correctly/wrong. We'll store currentWordTypedChars array.
    // We'll maintain separate: typedCharsForCurrentWord array of characters typed so far (length = currentCharIdx)
    if (!window._typedCurrentWord) window._typedCurrentWord = [];
    const typed = window._typedCurrentWord || [];
    for (let i = 0; i < currentWordChars.length; i++) {
      const span = currentWordChars[i];
      if (i < typed.length) {
        if (typed[i] === currentWordChars[i].textContent) {
          span.classList.add('correct');
        } else {
          span.classList.add('wrong');
        }
      } else if (i === typed.length) {
        span.classList.add('current');
      }
    }
  }
  
  function updateStatsAndUI() {
  let elapsedTime = startTime ? (Date.now() - startTime) / 60000 : 0;

  let wpm = 0;
  if (elapsedTime > 0) {
    wpm = Math.round((correctChars / 5) / elapsedTime);
  }

  const accuracy = totalTyped > 0 
    ? Math.round((correctChars / totalTyped) * 100) 
    : 100;

  wpmSpan.innerText = wpm;
  accSpan.innerText = `${accuracy}%`;
  errorsSpan.innerText = errorCount;
  charsSpan.innerText = correctChars;

  const percent = (timeLeft / selectedTime) * 100;
  timerProgressFill.style.width = `${percent}%`;
}
  
  function endTest() {
    if (timerInterval) clearInterval(timerInterval);
    testActive = false;
    const finalWPM = wpmSpan.innerText;
    const finalAcc = accSpan.innerText;
    const finalErr = errorCount;
    finalWpmSpan.innerText = finalWPM;
    finalAccSpan.innerText = finalAcc;
    finalErrorsSpan.innerText = finalErr;
    resultOverlay.classList.add('show');
  }
  
  function startTimerIfNeeded() {
    if (!testActive && timeLeft > 0 && timeLeft < selectedTime) {
      testActive = true;
      startTime = Date.now();
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if (!testActive) return;
        if (timeLeft <= 1) {
          clearInterval(timerInterval);
          timeLeft = 0;
          updateStatsAndUI();
          testActive = false;
          endTest();
        } else {
          timeLeft--;
          updateStatsAndUI();
          if (timeLeft === 0) {
            endTest();
          }
        }
      }, 1000);
    }
  }
  
  function processKey(keyChar) {
    if (!testActive) {
  testActive = true;
  startTime = Date.now();

  timerInterval = setInterval(() => {
    if (timeLeft <= 1) {
      clearInterval(timerInterval);
      timeLeft = 0;
      updateStatsAndUI();
      endTest();
    } else {
      timeLeft--;
      updateStatsAndUI();
    }
  }, 1000);
}
    if (!testActive || timeLeft <= 0) return false;
    if (currentWordIdx >= wordsList.length) return false;
    const currentWord = wordsList[currentWordIdx];
    const expectedChar = currentWord[currentCharIdx];
    if (!expectedChar && currentCharIdx >= currentWord.length) {
      // word completed, auto move next
      moveToNextWord();
      return processKey(keyChar); // re-process same key for next word? Not ideal but safe
    }
    if (keyChar === expectedChar) {
      // correct
      correctChars++;
      totalTyped++;
      if (!window._typedCurrentWord) window._typedCurrentWord = [];
      window._typedCurrentWord.push(keyChar);
      currentCharIdx++;
      playBeep(false);
      updateActiveWordHighlight();
      updateStatsAndUI();
      // if word completed
      if (currentCharIdx === currentWord.length) {
        moveToNextWord();
      }
      return true;
    } else {
      // wrong
      errorCount++;
      totalTyped++;
      if (!window._typedCurrentWord) window._typedCurrentWord = [];
      window._typedCurrentWord.push(keyChar);
      wordMistakeFlags[currentWordIdx] = true;
      currentCharIdx++; // in Monkeytype style, wrong advances char? Actually but typical typing test increments char index to lock mistake? To preserve consistency, we move char index, but show wrong char.
      updateActiveWordHighlight();
      updateStatsAndUI();
      playBeep(true);
      if (currentCharIdx === currentWord.length) {
        moveToNextWord();
      }
      return false;
    }
  }
  
  function moveToNextWord() {
    if (currentWordIdx + 1 < wordsList.length) {
      currentWordIdx++;
      currentCharIdx = 0;
      window._typedCurrentWord = [];
      updateActiveWordHighlight();
      smoothScrollToActiveWord();
    } else {
      // all words completed before timer ends: finish test early
      if (testActive && timeLeft > 0) {
        clearInterval(timerInterval);
        testActive = false;
        endTest();
      }
    }
  }
  
  function handleBackspace() {
    if (!testActive || timeLeft <= 0) return;
    if (currentCharIdx > 0) {
      currentCharIdx--;
      const typedArr = window._typedCurrentWord || [];
      typedArr.pop();
      window._typedCurrentWord = typedArr;
      updateActiveWordHighlight();
      updateStatsAndUI();
    } else if (currentWordIdx > 0 && currentCharIdx === 0) {
      // go to previous word, set at end of prev word
      currentWordIdx--;
      const prevWordLen = wordsList[currentWordIdx].length;
      currentCharIdx = prevWordLen;
      // reconstruct typed array for previous word as full correct? In premium mode, we can simulate that but we'll reset typedCurrentWord to full prev word characters (correct)
      const prevWord = wordsList[currentWordIdx];
      window._typedCurrentWord = prevWord.split('');
      updateActiveWordHighlight();
      updateStatsAndUI();
    }
  }
  
  function smoothScrollToActiveWord() {
    const wrapper = document.getElementById('wordsWrapper');
    const activeWordElem = wordElements[currentWordIdx];
    if (activeWordElem) {
      activeWordElem.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }
  
  function resetTest(newTime = selectedTime) {
    if (timerInterval) clearInterval(timerInterval);
    testActive = false;
    timeLeft = newTime;
    selectedTime = newTime;
    correctChars = 0;
    errorCount = 0;
    totalTyped = 0;
    currentWordIdx = 0;
    currentCharIdx = 0;
    window._typedCurrentWord = [];
    wordsList = getRandomWords(100);
    wordMistakeFlags.fill(false);
    renderWords();
    updateStatsAndUI();
    timerProgressFill.style.width = '100%';
    resultOverlay.classList.remove('show');
    ghostInput.focus();
  }
  
  function handleKeydownEvent(e) {
    const key = e.key;
    if (key === 'Tab' || key === 'Escape') {
      e.preventDefault();
      resetTest(selectedTime);
      return;
    }
    if (key === 'Backspace') {
      e.preventDefault();
      handleBackspace();
      return;
    }
    if (key.length === 1 && /[a-zA-Z]/i.test(key)) {
      e.preventDefault();
      const lowerKey = key.toLowerCase();
      processKey(lowerKey);
    }
    if (key === ' ' && testActive) {
      e.preventDefault();
      // if current word fully typed, move; else ignore
      if (currentCharIdx === wordsList[currentWordIdx]?.length) {
        moveToNextWord();
      }
    }
  }
  
  function setTimerMode(seconds) {
    selectedTime = seconds;
    resetTest(seconds);
  }
  
  // Theme toggle
  function initTheme() {
    const isDark = localStorage.getItem('theme') !== 'light';
    if (!isDark) document.body.classList.add('light');
    else document.body.classList.remove('light');
    const btn = document.getElementById('themeToggleBtn');
    btn.innerHTML = document.body.classList.contains('light') ? '🌙 Dark' : '☀️ Light';
    btn.onclick = () => {
      document.body.classList.toggle('light');
      const isLight = document.body.classList.contains('light');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
      btn.innerHTML = isLight ? '🌙 Dark' : '☀️ Light';
    };
  }
  
  function initSoundToggle() {
    const btn = document.getElementById('soundToggleBtn');
    btn.innerHTML = soundEnabled ? '🔊 Sound ON' : '🔇 Sound OFF';
    btn.onclick = () => {
      soundEnabled = !soundEnabled;
      btn.innerHTML = soundEnabled ? '🔊 Sound ON' : '🔇 Sound OFF';
      if (!soundEnabled && audioCtx) audioCtx.close();
      audioCtx = null;
    };
  }
  
  function init() {
    initTheme();
    initSoundToggle();
    wordsList = getRandomWords(100);
    renderWords();
    updateStatsAndUI();
    ghostInput.focus();
    window.addEventListener('keydown', handleKeydownEvent);
    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const seconds = parseInt(btn.dataset.time, 10);
        setTimerMode(seconds);
      });
    });
    document.getElementById('resultRestartBtn').addEventListener('click', () => {
      resetTest(selectedTime);
    });
    // click anywhere to refocus hidden input
    document.body.addEventListener('click', () => ghostInput.focus());
    ghostInput.addEventListener('blur', () => setTimeout(() => ghostInput.focus(), 10));
  }
  
  init();
</script>
</body>
